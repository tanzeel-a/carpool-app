<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    @keyframes wave {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(15deg); }
      75% { transform: rotate(-15deg); }
    }
    .avatar { animation: bounce 1.5s ease-in-out infinite; }
    .hand { animation: wave 1s ease-in-out infinite; transform-origin: 44px 28px; }
  </style>

  <!-- Shadow -->
  <ellipse cx="32" cy="58" rx="12" ry="4" fill="#000" fill-opacity="0.15"/>

  <!-- Avatar body group with bounce -->
  <g class="avatar">
    <!-- Body -->
    <path d="M22 42 C22 36 26 32 32 32 C38 32 42 36 42 42 L42 48 C42 50 40 52 38 52 L26 52 C24 52 22 50 22 48 Z" fill="url(#shirtGradient)"/>

    <!-- Head -->
    <circle cx="32" cy="22" r="12" fill="url(#skinGradient)"/>

    <!-- Hair -->
    <path d="M20 18 C20 10 26 6 32 6 C38 6 44 10 44 18 C44 14 40 12 32 12 C24 12 20 14 20 18 Z" fill="#2c1810"/>

    <!-- Eyes -->
    <ellipse cx="27" cy="22" rx="2" ry="2.5" fill="#2c1810"/>
    <ellipse cx="37" cy="22" rx="2" ry="2.5" fill="#2c1810"/>
    <circle cx="27.5" cy="21.5" r="0.8" fill="#fff"/>
    <circle cx="37.5" cy="21.5" r="0.8" fill="#fff"/>

    <!-- Smile -->
    <path d="M28 28 Q32 32 36 28" stroke="#2c1810" stroke-width="1.5" stroke-linecap="round" fill="none"/>

    <!-- Cheeks -->
    <circle cx="24" cy="25" r="2" fill="#ffb5b5" fill-opacity="0.5"/>
    <circle cx="40" cy="25" r="2" fill="#ffb5b5" fill-opacity="0.5"/>

    <!-- Waving hand -->
    <g class="hand">
      <circle cx="46" cy="28" r="5" fill="url(#skinGradient)"/>
      <path d="M44 24 L46 20 M45 25 L48 22 M47 26 L50 24" stroke="url(#skinGradient)" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <defs>
    <linearGradient id="shirtGradient" x1="22" y1="32" x2="42" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d4af37"/>
      <stop offset="1" stop-color="#aa8a2e"/>
    </linearGradient>
    <linearGradient id="skinGradient" x1="20" y1="10" x2="44" y2="34" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffd5b5"/>
      <stop offset="1" stop-color="#e8b896"/>
    </linearGradient>
  </defs>
</svg>
